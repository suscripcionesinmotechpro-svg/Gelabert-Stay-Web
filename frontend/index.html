<!doctype html>
<html lang="es" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gelabert Homes Real Estate</title>
    <meta name="google-site-verification" content="33v5NsdcO_FixLV6WMHI8siyYDdqnxib_pNIf1xa28k" />
    
    <!-- Open Graph / Meta tags para compartir -->
    <meta property="og:title" content="Gelabert Homes Real Estate" />
    <meta property="og:description" content="Gestión inmobiliaria en Málaga & Costa del Sol. Especialistas en alquiler, venta y traspaso." />
    <meta property="og:image" content="https://gelaberthomes.es/sharing-logo.jpg" />
    <meta property="og:url" content="https://gelaberthomes.es" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gelabert Homes Real Estate" />
    <meta name="twitter:description" content="Gestión inmobiliaria en Málaga & Costa del Sol. Especialistas en alquiler, venta y traspaso." />
    <meta name="twitter:image" content="https://gelaberthomes.es/sharing-logo.jpg" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  </head>
  <body class="h-full antialiased font-primary">
    <div id="root" class="h-full"></div>

    <!-- Cuestionario oculto para que Netlify Forms lo detecte en una SPA (React) -->
    <form name="property-owners-contact" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="city" />
      <input type="radio" name="operation_type" value="vender" />
      <input type="radio" name="operation_type" value="alquilar" />
      <textarea name="message"></textarea>
    </form>

    <form name="general-contact" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="inquiry_type">
        <option value="compra"></option>
        <option value="alquiler"></option>
        <option value="venta"></option>
        <option value="colaborar"></option>
        <option value="trabajar"></option>
        <option value="otro"></option>
      </select>
      <textarea name="message"></textarea>
    </form>

    <form name="property-inquiry" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="property_id" />
      <input type="text" name="property_reference" />
      <textarea name="message"></textarea>
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
