    <text font-family="'Manrope', 'Comfortaa', 'Helvetica', sans-serif" font-size="36" font-weight="800" letter-spacing="0.05em">huspy</text>
    <!-- Subtitle "AUTHORIZED PARTNER" -->
    <text font-family="'Manrope', 'Helvetica', 'Arial', sans-serif" font-size="9" font-weight="700" letter-spacing="0.32em" y="16" opacity="0.6">AUTHORIZED PARTNER</text>
  </g>
