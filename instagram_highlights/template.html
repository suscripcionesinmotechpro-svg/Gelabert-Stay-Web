<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Highlight Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080808;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: #C5A059;
            font-family: 'Montserrat', sans-serif;
        }
        .container {
            width: 1080px;
            height: 1920px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .circle {
            border: 10px solid #C5A059;
            border-radius: 50%;
            width: 700px;
            height: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(197, 160, 89, 0.1);
        }
        .text {
            font-size: 80px;
            text-align: center;
            text-transform: uppercase;
            line-height: 1.2;
            letter-spacing: 2px;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle">
            <div class="text" id="service-text">GESTIÓN DE<br>ALQUILER</div>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const text = params.get('text');
        if (text) {
            document.getElementById('service-text').innerHTML = text.replace('\\n', '<br>');
        }
    </script>
</body>
</html>
