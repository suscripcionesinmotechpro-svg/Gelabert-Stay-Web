<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Highlight Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: #C5A059;
            font-family: 'Montserrat', sans-serif;
        }
        .container {
            width: 1080px;
            height: 1920px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .circle {
            background: linear-gradient(145deg, #111111, #080808);
            border: 4px solid #C5A059;
            border-radius: 50%;
            width: 600px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 40px rgba(197, 160, 89, 0.2),
                inset 0 0 20px rgba(0,0,0,0.8),
                20px 20px 60px #000,
                -20px -20px 60px #111;
            position: relative;
        }
        .circle::after {
            content: '';
            position: absolute;
            inset: -10px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%;
        }
        .text {
            font-size: 60px;
            text-align: center;
            text-transform: uppercase;
            line-height: 1.1;
            letter-spacing: 4px;
            padding: 40px;
            background: linear-gradient(to bottom, #EBCB8B 0%, #C5A059 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle">
            <div class="text" id="service-text">GESTIÓN DE<br>ALQUILER</div>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const text = params.get('text');
        if (text) {
            document.getElementById('service-text').innerHTML = text.replace('\\n', '<br>');
        }
    </script>
</body>
</html>
